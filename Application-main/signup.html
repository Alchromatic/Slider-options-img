<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!-- Title -->
      <title>Sign Up | GeoMagic</title>

      <!-- favicon -->
      <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
      <link rel="icon" type="image/png" sizes="512x512" href="assets/img/favicon/android-chrome-512x512.png">
      <link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon/android-chrome-192x192.png">
      <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon/favicon-32x32.png">
      <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon/favicon-16x16.png">
      <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon/favicon.ico">
      <link rel="manifest" href="assets/img/favicon/site.webmanifest">

      <!-- google fonts cdn -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

      <!-- vendor css -->
      <link rel="stylesheet" href="assets/fontawesome/fontawesome.min.css">

      <!-- main css -->
      <link rel="stylesheet" href="assets/css/output.css">
   </head>

   <body class="bg-white dark:bg-neutral-7">

      <div class="flex">
         <!-- sidebar start -->
         <aside class="shrink-0 w-80 xl:w-100 h-screen sticky top-0 left-0 bg-[#F4F4F4] dark:bg-neutral-8 p-6 flex items-center justify-center overflow-auto max-lg:hidden">
            <!-- logo -->
            <a href="index.html" class="inline-block fixed top-6 left-6">
               <img src="assets/img/logo/logo-icon.png" alt="logo" class="w-9 lg:w-12 aspect-square hidden dark:inline-block">
               <img src="assets/img/logo/logo-icon-blue.png" alt="logo" class="w-9 lg:w-12 aspect-square dark:hidden">
            </a>

            <!-- sidebar content -->
            <div class="flex flex-col items-center justify-center gap-12">
               <img src="assets/img/shape/sidebar-shape.png" alt="sidebar shape" class="w-38">
               <h4 class="text-neutral-6 dark:text-neutral-3 text-[32px] leading-[1.25] font-semibold -tracking-[0.96px]">Plan includes</h4>
               <ul class="space-y-5">
                  <li class="flex items-center gap-3 text-neutral-4 text-sm leading-6 font-semibold -tracking-[0.14px]">
                     <span class="flex items-center justify-center w-6 h-6 text-theme-primary-2 text-xl"><i class="fa-regular fa-circle-check"></i></span>
                     <span>Unlimited uploads</span>
                  </li>
                  <li class="flex items-center gap-3 text-neutral-4 text-sm leading-6 font-semibold -tracking-[0.14px]">
                     <span class="flex items-center justify-center w-6 h-6 text-theme-primary-2 text-xl"><i class="fa-regular fa-circle-check"></i></span>
                     <span>Pro tips</span>
                  </li>
                  <li class="flex items-center gap-3 text-neutral-4 text-sm leading-6 font-semibold -tracking-[0.14px]">
                     <span class="flex items-center justify-center w-6 h-6 text-theme-primary-2 text-xl"><i class="fa-regular fa-circle-check"></i></span>
                     <span>Free forever</span>
                  </li>
                  <li class="flex items-center gap-3 text-neutral-4 text-sm leading-6 font-semibold -tracking-[0.14px]">
                     <span class="flex items-center justify-center w-6 h-6 text-theme-primary-2 text-xl"><i class="fa-regular fa-circle-check"></i></span>
                     <span>Full options</span>
                  </li>
               </ul>
            </div>
         </aside>
         <!-- sidebar end -->

         <main class="grow min-w-0">
            <!-- signup header -->
            <header class="p-6 flex items-center justify-between lg:justify-end">
               <!-- logo -->
               <a href="index.html" class="inline-block lg:hidden">
                  <img src="assets/img/logo/logo-icon.png" alt="logo" class="w-9 lg:w-12 aspect-square hidden dark:inline-block">
                  <img src="assets/img/logo/logo-icon-blue.png" alt="logo" class="w-9 lg:w-12 aspect-square dark:hidden">
               </a>
               <div class="flex items-center">
                  <p class="p-4 text-neutral-4 dark:text-[#9A9FA5] text-xs font-semibold -tracking-[0.12px]">Already a member? <a href="signin.html" class="text-neutral-7 dark:text-neutral-1 hover:text-theme-primary dark:hover:text-white">Sign in</a></p>
                  <!-- theme toggle -->
                  <label class="cursor-pointer relative flex items-center gap-2.5">
                     <input type="checkbox" title="theme toggle" class="sr-only peer" id="themeToggle" checked>
                     <span class="flex items-center justify-center w-9 h-9 rounded-lg bg-theme-primary"></span>
                     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white hidden dark:block">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                     </svg>
                     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white dark:hidden">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                     </svg>
                  </label>
               </div>
            </header>
            <!-- signup header end -->

            <!-- signup main wrapper -->
            <div class="min-h-[calc(100vh-96px)] flex items-center justify-center overflow-auto p-10">
               <!-- signup form start -->
               <form action="#" id="signupForm" class="max-w-74">
                  <h2 class="text-neutral-6 dark:text-neutral-1 text-5xl font-semibold -tracking-[1.44px] mb-8">Sign up</h2>
                  <div>
                     <h6 class="text-neutral-8 dark:text-white text-sm leading-6 font-semibold -tracking-[0.14px] mb-5">Sign up with Open account</h6>
                     <div class="flex items-center gap-2">
                        <button type="button" class="grow flex items-center justify-center gap-2 px-4.5 py-2.5 text-neutral-8 dark:text-neutral-1 text-[15px] leading-[1.6] font-bold -tracking-[0.15px] border-2 border-[#F4F4F4] dark:border-neutral-6 rounded-xl bg-[#F4F4F4] dark:bg-transparent dark:hover:bg-neutral-6">
                           <img src="assets/img/icon/google.svg" alt="google" class="w-6 aspect-square">
                           <span>Google</span>
                        </button>
                        <button type="button" class="grow flex items-center justify-center gap-2 px-4.5 py-2.5 text-neutral-8 dark:text-neutral-1 text-[15px] leading-[1.6] font-bold -tracking-[0.15px] border-2 border-[#F4F4F4] dark:border-neutral-6 rounded-xl bg-[#F4F4F4] dark:bg-transparent dark:hover:bg-neutral-6">
                           <img src="assets/img/icon/apple.svg" alt="apple" class="w-6 aspect-square hidden dark:block">
                           <img src="assets/img/icon/apple-black.svg" alt="apple" class="w-6 aspect-square dark:hidden">
                           <span>Apple ID</span>
                        </button>
                     </div>
                  </div>
                  <!-- divider -->
                  <div class="w-full h-0.5 bg-[#F4F4F4] dark:bg-neutral-6 rounded my-8"></div>
                  <div>
                     <h6 class="text-neutral-6 dark:text-white text-sm leading-6 font-semibold -tracking-[0.14px] mb-5">Or continue with email address</h6>
                     <div class="space-y-3 mb-8">
                        <div class="relative">
                           <input type="text" id="signupName" title="name" class="w-full py-3 px-12 text-neutral-7 dark:text-neutral-1 placeholder:text-[#757185] text-[15px] leading-[1.6] font-semibold -tracking-[0.15px] caret-theme-primary rounded-xl bg-[#F4F4F4] dark:bg-neutral-8 focus:outline-none" placeholder="Full name" autocomplete="name">
                           <span class="flex items-center justify-center w-6 h-6 absolute top-1/2 -translate-y-1/2 left-3 pointer-events-none text-[#757185] text-lg"><i class="fa-regular fa-user"></i></span>
                        </div>
                        <div class="relative">
                           <input type="email" id="signupEmail" title="email" class="w-full py-3 px-12 text-neutral-7 dark:text-neutral-1 placeholder:text-[#757185] text-[15px] leading-[1.6] font-semibold -tracking-[0.15px] caret-theme-primary rounded-xl bg-[#F4F4F4] dark:bg-neutral-8 focus:outline-none" placeholder="Email" autocomplete="email">
                           <span class="flex items-center justify-center w-6 h-6 absolute top-1/2 -translate-y-1/2 left-3 pointer-events-none"><img src="assets/img/icon/envelope.svg" alt="envelope" class="w-full"></span>
                        </div>
                        <div class="relative">
                           <input type="password" id="signupPassword" title="password" class="w-full py-3 px-12 text-neutral-7 dark:text-neutral-1 placeholder:text-[#757185] text-[15px] leading-[1.6] font-semibold -tracking-[0.15px] caret-theme-primary rounded-xl bg-[#F4F4F4] dark:bg-neutral-8 focus:outline-none" placeholder="Password (min 6 characters)" autocomplete="new-password">
                           <span class="flex items-center justify-center w-6 h-6 absolute top-1/2 -translate-y-1/2 left-3 pointer-events-none"><img src="assets/img/icon/lock.svg" alt="lock" class="w-full"></span>
                        </div>
                        <p id="signupError" class="hidden text-red-500 text-sm leading-6 font-semibold -tracking-[0.14px]"></p>
                        <button type="submit" id="signupSubmit" class="theme-btn-primary w-full">Continue</button>
                     </div>
                     <p class="text-neutral-4 text-sm leading-6 font-semibold -tracking-[0.14px]">This site is protected by reCAPTCHA and the Google Privacy Policy.</p>
                  </div>
               </form>
               <!-- signup form end -->
            </div>
         </main>
      </div>

      <!-- main js -->
      <script src="assets/js/main.js"></script>
      <script src="assets/js/auth.js"></script>
      <script>
         (function () {
            const form = document.getElementById('signupForm');
            const nameEl = document.getElementById('signupName');
            const emailEl = document.getElementById('signupEmail');
            const passEl = document.getElementById('signupPassword');
            const errEl = document.getElementById('signupError');
            const btn = document.getElementById('signupSubmit');

            // Already signed in → go to pricing (which bounces to dashboard if subscribed).
            if (window.Auth && Auth.isAuthenticated()) {
               window.location.href = 'pricing.html';
               return;
            }

            function showError(msg) {
               errEl.textContent = msg;
               errEl.classList.remove('hidden');
            }

            form.addEventListener('submit', async function (e) {
               e.preventDefault();
               errEl.classList.add('hidden');
               const name = (nameEl.value || '').trim();
               const email = (emailEl.value || '').trim();
               const password = passEl.value || '';
               if (!email || !password) {
                  showError('Please enter your email and password.');
                  return;
               }
               if (password.length < 6) {
                  showError('Password must be at least 6 characters.');
                  return;
               }
               btn.disabled = true;
               const original = btn.textContent;
               btn.textContent = 'Creating account…';
               try {
                  await Auth.register({ email, password, name });
                  window.location.href = 'pricing.html';
               } catch (err) {
                  showError(err.message || 'Sign up failed.');
                  btn.disabled = false;
                  btn.textContent = original;
               }
            });
         })();
      </script>
   </body>

</html>
